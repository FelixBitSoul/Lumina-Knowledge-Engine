# Base configuration for Lumina Brain API

# API settings
api:
  host: "0.0.0.0"
  port: 8000

# CORS settings
cors:
  origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"

# Model settings
model:
  name: "all-MiniLM-L6-v2"
  cache_dir: "/app/models"

# Qdrant settings
qdrant:
  host: "localhost"
  port: 6333
  collection: "knowledge_base"

# Log settings
log:
  level: "info"

# Redis settings
redis:
  host: "localhost"
  port: 6379
  db: 0

# MinIO settings
minio:
  endpoint: "localhost:9000"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  bucket: "lumina-documents"
  secure: false
  presigned_expiry: 600

# Celery settings
celery:
  broker_url: "redis://localhost:6379/0"
  result_backend: "redis://localhost:6379/1"
  worker_concurrency: 4
