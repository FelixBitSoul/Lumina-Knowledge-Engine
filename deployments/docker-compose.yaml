version: '3.8'

# =============================================================================
# Lumina Knowledge Engine - Docker Compose Base Configuration
# =============================================================================
# This is the base configuration file that contains common service definitions,
# networks, volumes, and general environment variables. It is intended to be
# extended by environment-specific files (docker-compose.override.yml for development
# and docker-compose.prod.yml for production).
#
# Services:
#   - Redis: Message broker and Pub/Sub
#   - MinIO: Object storage
#   - Qdrant: Vector database for semantic search
#   - Brain API: Python FastAPI service for embedding & search
#   - Portal: Next.js frontend for user interface
#   - Celery Worker: Asynchronous document processing
#   - Crawler (optional): Go-based web crawler for content ingestion
#
# Documentation: https://github.com/FelixBitSoul/lumina/docs/deployment/
# =============================================================================

services:
  # ===========================================================================
  # Redis - Message Broker and Pub/Sub
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: lumina-redis
    hostname: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - lumina-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # MinIO - Object Storage
  # ===========================================================================
  minio:
    image: minio/minio:latest
    container_name: lumina-minio
    hostname: minio
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - lumina-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # PostgreSQL - Relational Database for Metadata
  # ===========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: lumina-postgres
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=lumina
      - POSTGRES_USER=lumina
      - POSTGRES_PASSWORD=lumina123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lumina-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "lumina"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # Qdrant Vector Database
  # ===========================================================================
  qdrant:
    image: qdrant/qdrant:${QDRANT_VERSION}
    container_name: lumina-qdrant
    hostname: qdrant
    ports:
      - "${HOST_QDRANT_REST_PORT}:6333"  # REST API port
      - "${HOST_QDRANT_GRPC_PORT}:6334"  # gRPC API port
    volumes:
      - qdrant_data:/qdrant/storage
      # Optional: Custom configuration
      # - ./qdrant_config.yaml:/qdrant/config/production.yaml:ro
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    networks:
      - lumina-network

  # ===========================================================================
  # Brain API Service
  # ===========================================================================
  brain-api:
    build:
      context: ../services/lumina-brain
      dockerfile: Dockerfile
    container_name: lumina-brain-api
    hostname: brain-api
    ports:
      - "${HOST_BRAIN_API_PORT}:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION}
      - MODEL_NAME=${MODEL_NAME}
      - MODEL_CACHE_DIR=${MODEL_CACHE_DIR}
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=info
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=lumina-documents
      - MINIO_SECURE=false
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=lumina
      - POSTGRES_USER=lumina
      - POSTGRES_PASSWORD=lumina123
    volumes:
      - brain_models:/app/models
      - ./logs/brain-api:/app/logs
    networks:
      - lumina-network
    restart: unless-stopped
    depends_on:
      - qdrant
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================================================
  # Portal Frontend
  # ===========================================================================
  portal:
    build:
      context: ../services/portal-next
      dockerfile: Dockerfile
    container_name: lumina-portal
    hostname: portal
    ports:
      - "${HOST_PORTAL_PORT}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${HOST_BRAIN_API_PORT}
      - PORT=3000
    networks:
      - lumina-network
    restart: unless-stopped
    depends_on:
      - brain-api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================================================
  # Celery Worker - Asynchronous Document Processing
  # ===========================================================================
  celery-worker:
    build:
      context: ../services/lumina-brain
      dockerfile: Dockerfile
    container_name: lumina-celery-worker
    hostname: celery-worker
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION}
      - MODEL_NAME=${MODEL_NAME}
      - MODEL_CACHE_DIR=${MODEL_CACHE_DIR}
      - LOG_LEVEL=info
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=lumina-documents
      - MINIO_SECURE=false
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=lumina
      - POSTGRES_USER=lumina
      - POSTGRES_PASSWORD=lumina123
    volumes:
      - brain_models:/app/models
      - ./logs/celery:/app/logs
    networks:
      - lumina-network
    restart: unless-stopped
    depends_on:
      - redis
      - minio
      - qdrant
    command: celery -A lumina_brain.celery_app worker --loglevel=info --concurrency=4

  # ===========================================================================
  # Crawler Service (Optional)
  # ===========================================================================
  crawler:
    build:
      context: ../services/crawler-go
      dockerfile: Dockerfile
    container_name: lumina-crawler
    hostname: crawler
    environment:
      - BRAIN_INGEST_URL=${BRAIN_INGEST_URL}
      - CRAWLER_CONFIG=/app/config/crawler-config.yaml
      - LOG_LEVEL=${LOG_LEVEL}
    volumes:
      - ../services/crawler-go/crawler-config.yaml:/app/config/crawler-config.yaml:ro
      - ./logs/crawler:/app/logs
    networks:
      - lumina-network
    depends_on:
      - brain-api
    profiles:
      - crawler
    command: ["./crawler"]
    restart: "no"

# =============================================================================
# Networks
# =============================================================================
networks:
  lumina-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

# =============================================================================
# Volumes
# =============================================================================
volumes:
  qdrant_data:
    driver: local
  brain_models:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  postgres_data:
    driver: local
