version: '3.8'

# =============================================================================
# Lumina Knowledge Engine - Docker Compose Configuration
# =============================================================================
# This configuration provides a complete local deployment of the Lumina
# Knowledge Engine with all core services.
#
# Services:
#   - Qdrant: Vector database for semantic search (ports 6333, 6334)
#   - Brain API: Python FastAPI service for embedding & search (port 8000)
#   - Portal: Next.js frontend for user interface (port 3000)
#   - Crawler (optional): Go-based web crawler for content ingestion
#
# Quick Start:
#   docker-compose up -d          # Start all services
#   docker-compose up -d qdrant   # Start only Qdrant
#   docker-compose logs -f        # Follow logs
#   docker-compose down           # Stop all services
#
# Documentation: https://github.com/your-org/lumina/docs/deployment/
# =============================================================================

services:
  # ===========================================================================
  # Qdrant Vector Database
  # ===========================================================================
  qdrant:
    image: qdrant/qdrant:${QDRANT_VERSION}
    container_name: lumina-qdrant
    hostname: qdrant
    ports:
      - "${HOST_QDRANT_REST_PORT}:6333"  # REST API port
      - "${HOST_QDRANT_GRPC_PORT}:6334"  # gRPC API port
    volumes:
      - qdrant_data:/qdrant/storage
      # Optional: Custom configuration
      # - ./qdrant_config.yaml:/qdrant/config/production.yaml:ro
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    networks:
      - lumina-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================================================
  # Brain API Service
  # ===========================================================================
  brain-api:
    build:
      context: ../services/brain-py
      dockerfile: Dockerfile
    container_name: lumina-brain-api
    hostname: brain-api
    ports:
      - "${HOST_BRAIN_API_PORT}:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION}
      - MODEL_NAME=${MODEL_NAME}
      - MODEL_CACHE_DIR=${MODEL_CACHE_DIR}
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=info
    volumes:
      - brain_models:/app/models
      - ./logs/brain-api:/app/logs
    networks:
      - lumina-network
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================================================
  # Portal Frontend
  # ===========================================================================
  portal:
    build:
      context: ../services/portal-next
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:${HOST_BRAIN_API_PORT}
        - NODE_ENV=production
    container_name: lumina-portal
    hostname: portal
    ports:
      - "${HOST_PORTAL_PORT}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${HOST_BRAIN_API_PORT}
      - NODE_ENV=production
      - PORT=3000
    networks:
      - lumina-network
    restart: unless-stopped
    depends_on:
      brain-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================================================
  # Crawler Service (Optional)
  # ===========================================================================
  crawler:
    build:
      context: ../services/crawler-go
      dockerfile: Dockerfile
    container_name: lumina-crawler
    hostname: crawler
    environment:
      - BRAIN_INGEST_URL=${BRAIN_INGEST_URL}
      - CRAWLER_CONFIG=/app/config/crawler-config.yaml
      - LOG_LEVEL=${LOG_LEVEL}
    volumes:
      - ../services/crawler-go/crawler-config.yaml:/app/config/crawler-config.yaml:ro
      - ./logs/crawler:/app/logs
    networks:
      - lumina-network
    depends_on:
      brain-api:
        condition: service_healthy
    profiles:
      - crawler
    command: ["./crawler"]
    restart: "no"

# =============================================================================
# Networks
# =============================================================================
networks:
  lumina-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

# =============================================================================
# Volumes
# =============================================================================
volumes:
  qdrant_data:
    driver: local
  brain_models:
    driver: local
